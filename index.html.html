<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>股市儀表板 v5.0</title>
<style>
  :root {
    --bg:      #080a10;
    --bg2:     #0f1117;
    --bg3:     #0a0c12;
    --border:  #1a1d27;
    --border2: #2a2d3a;
    --text:    #e2e8f0;
    --muted:   #3a3d4a;
    --dim:     #555;
    --green:   #4ade80;
    --green-bg:#081408;
    --green-bd:#166534;
    --yellow:  #fbbf24;
    --yellow-bg:#1a1200;
    --yellow-bd:#92400e;
    --red:     #f87171;
    --red-bg:  #140808;
    --red-bd:  #7f1d1d;
    --blue:    #4a7aaa;
    --purple:  #a78bfa;
    --purple-bg:#120820;
    --purple-bd:#4c1d95;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;
    font-size:14px;
    min-height:100vh;
    padding:14px 14px 40px;
    max-width:520px;
    margin:0 auto;
  }

  /* ── 頂部狀態列 ── */
  #topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  #topbar .title {
    font-size:0.95rem;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:6px;
  }
  #topbar .title .diamond { color:#4a6a9a; }
  #topbar .badge {
    font-size:0.55rem;
    color:var(--muted);
    background:var(--border);
    padding:1px 5px;
    border-radius:3px;
  }
  #topbar .subtitle {
    font-size:0.56rem;
    color:#2a3040;
    margin-top:3px;
  }
  #topbar .right { text-align:right; }
  #updated { font-size:0.58rem; color:var(--muted); }

  /* ── 更新狀態指示 ── */
  #refresh-bar {
    display:flex;
    align-items:center;
    gap:6px;
    font-size:0.58rem;
    color:var(--dim);
    margin-bottom:8px;
    height:18px;
  }
  #refresh-dot {
    width:6px; height:6px;
    border-radius:50%;
    background:var(--dim);
    transition:background 0.3s;
  }
  #refresh-dot.live { background:var(--green); animation:pulse 2s infinite; }
  #refresh-dot.updating { background:var(--yellow); }
  #refresh-dot.error { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #new-badge {
    display:none;
    background:var(--green-bg);
    border:1px solid var(--green-bd);
    color:var(--green);
    font-size:0.55rem;
    padding:1px 6px;
    border-radius:3px;
    animation:fadein 0.4s;
  }
  @keyframes fadein { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }

  /* ── 大盤濾網 ── */
  #market-banner {
    border-radius:8px;
    padding:8px 12px;
    margin-bottom:8px;
    transition:background 0.4s;
  }
  #market-banner .label { font-size:0.56rem; opacity:0.6; margin-bottom:2px; }
  #market-banner .value { font-size:0.85rem; font-weight:700; }

  /* ── 統計格 ── */
  .stat-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:5px;
    margin-bottom:6px;
  }
  .stat-cell {
    border-radius:7px;
    padding:7px 0;
    text-align:center;
    transition:transform 0.15s;
  }
  .stat-cell:active { transform:scale(0.97); }
  .stat-cell .num { font-size:1.3rem; font-weight:700; line-height:1; }
  .stat-cell .lbl { font-size:0.56rem; opacity:0.7; margin-top:2px; }

  /* ── 卡片 ── */
  .card {
    border-radius:10px;
    border:1px solid var(--border);
    overflow:hidden;
    margin-bottom:8px;
    transition:border-color 0.2s;
  }
  .card.open { border-color:var(--border2); }
  .card-head {
    padding:12px 14px;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
  }
  .card-head:active { opacity:0.85; }

  .row-title {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:7px;
  }
  .name-area { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .stock-name { font-size:0.95rem; font-weight:700; }
  .market-tag {
    font-size:0.52rem;
    color:#4a6a8a;
    background:#0a1220;
    border:1px solid #1a2d4a;
    border-radius:3px;
    padding:1px 5px;
  }
  .symbol { font-size:0.6rem; color:var(--muted); }
  .lamp-badge {
    font-size:0.6rem;
    border-radius:4px;
    padding:2px 7px;
    font-weight:600;
    white-space:nowrap;
  }
  .chevron { color:var(--muted); font-size:0.7rem; margin-left:4px; transition:transform 0.2s; }
  .card.open .chevron { transform:rotate(180deg); }

  .row-price {
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:7px;
  }
  .price { font-size:1.35rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .day-chg { font-weight:600; font-size:0.82rem; }
  .week-chg { font-size:0.58rem; color:var(--muted); margin-left:auto; }

  /* LT badge */
  .lt-badge {
    display:inline-flex;
    align-items:center;
    gap:5px;
    border-radius:5px;
    padding:3px 8px;
    margin-bottom:5px;
  }
  .lt-badge .lt-code { font-size:0.62rem; font-weight:700; }
  .lt-badge .lt-text { font-size:0.6rem; opacity:0.8; }

  /* 加碼觸發 */
  .add-trigger-box {
    background:var(--green-bg);
    border:1px solid var(--green-bd);
    border-radius:5px;
    padding:5px 8px;
    margin-top:5px;
  }
  .add-trigger-box .atitle { font-size:0.6rem; color:var(--green); font-weight:700; margin-bottom:3px; }
  .add-sigs { display:flex; flex-wrap:wrap; gap:4px; }
  .add-sig {
    background:#0d2818;
    color:var(--green);
    border:1px solid var(--green-bd);
    border-radius:3px;
    padding:1px 6px;
    font-size:0.56rem;
  }
  .add-blocked {
    background:var(--red-bg);
    border:1px solid var(--red-bd);
    border-radius:5px;
    padding:4px 8px;
    font-size:0.58rem;
    color:var(--red);
    margin-top:5px;
  }

  /* 長期持倉 */
  .lt-pos-box {
    background:#0a0f1a;
    border:1px solid #1e3a5f;
    border-radius:6px;
    padding:6px 10px;
    margin-top:5px;
  }
  .lt-pos-box .lp-label { font-size:0.58rem; color:var(--blue); margin-bottom:4px; }
  .lt-pos-box .lp-row { display:flex; gap:10px; align-items:center; }
  .lt-pos-box .lp-item { font-size:0.65rem; color:#7aaad0; }
  .lt-pos-box .lp-pnl { font-size:0.7rem; font-weight:700; margin-left:auto; }

  /* 停損警示 */
  .lt-stop-box {
    background:#1a0a00;
    border:1px solid #c2410c;
    border-radius:5px;
    padding:4px 8px;
    margin-top:5px;
    font-size:0.58rem;
    color:#fb923c;
  }

  /* 2欄格 */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .ptag {
    background:#0a0c14;
    border-radius:6px;
    padding:6px 8px;
    text-align:center;
    border:1px solid var(--border);
  }
  .ptag .pl { font-size:0.56rem; color:#444; margin-bottom:2px; }
  .ptag .pv { font-weight:700; font-size:0.78rem; }

  .rr-box {
    border-radius:6px;
    padding:5px 8px;
    text-align:center;
  }
  .rr-box .rl { font-size:0.54rem; margin-bottom:2px; }
  .rr-box .rv { font-size:0.88rem; font-weight:700; }

  /* 五關燈號 */
  .gates { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; }
  .gate {
    font-size:0.58rem;
    border-radius:4px;
    padding:2px 6px;
    white-space:nowrap;
  }
  .gate.ok  { background:#0d2818; color:var(--green); border:1px solid #166534; }
  .gate.no  { background:#13141a; color:#3a3d4a; border:1px solid #252830; }
  .gate.pnd { background:var(--border); color:var(--dim); border:1px solid var(--border2); }

  /* 分數條 */
  .score-bar { display:flex; align-items:center; gap:8px; }
  .score-track { flex:1; height:4px; background:#1e2130; border-radius:2px; overflow:hidden; }
  .score-fill { height:100%; border-radius:2px; transition:width 0.5s; }
  .score-label { font-size:0.62rem; color:var(--dim); min-width:24px; text-align:right; }

  /* 展開層 */
  .card-body {
    border-top:1px solid var(--border);
    padding:12px 14px;
    background:var(--bg3);
    display:none;
  }
  .card.open .card-body { display:block; }
  .section-title { font-size:0.6rem; color:#444; margin-bottom:5px; letter-spacing:0.05em; }

  .lt-detail {
    background:#0a0f18;
    border:1px solid #1e2d4a;
    border-radius:7px;
    padding:8px 10px;
    margin-bottom:10px;
  }
  .lt-detail .ld-label { font-size:0.6rem; color:var(--blue); margin-bottom:4px; }
  .lt-detail .ld-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .lt-detail .ld-rating { font-size:0.82rem; font-weight:700; }
  .lt-detail .ld-text { font-size:0.65rem; }
  .lt-detail .ld-score { font-size:0.62rem; color:#3a5a7a; margin-left:auto; }
  .lt-detail .ld-reasons { font-size:0.58rem; color:#4a6a8a; line-height:1.6; }
  .lt-detail .ld-sigs { margin-top:5px; font-size:0.58rem; color:var(--green); }

  .sup-res { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
  .sup-box { background:var(--green-bg); border:1px solid var(--green-bd); border-radius:7px; padding:8px 10px; }
  .res-box { background:var(--red-bg); border:1px solid var(--red-bd); border-radius:7px; padding:8px 10px; }
  .sup-box .sl { font-size:0.56rem; color:var(--green); margin-bottom:3px; }
  .res-box .sl { font-size:0.56rem; color:var(--red); margin-bottom:3px; }
  .sup-box .sv { font-size:1rem; font-weight:700; color:var(--green); }
  .res-box .sv { font-size:1rem; font-weight:700; color:var(--red); }
  .sup-box .sd { font-size:0.54rem; color:var(--green); opacity:0.5; margin-top:2px; }

  .indicators { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
  .ind-cell { background:var(--bg2); border-radius:5px; padding:4px 7px; border:1px solid var(--border); }
  .ind-cell .ik { font-size:0.54rem; color:#444; }
  .ind-cell .iv { font-size:0.73rem; font-weight:600; color:#8899aa; }

  /* 頁尾 */
  #footer {
    margin-top:16px;
    font-size:0.56rem;
    color:#2a2d3a;
    line-height:1.9;
    border-top:1px solid var(--border);
    padding-top:10px;
  }

  /* 空狀態 */
  #empty {
    text-align:center;
    padding:60px 20px;
    color:var(--dim);
  }
  #empty .big { font-size:2rem; margin-bottom:12px; }
  #empty p { font-size:0.75rem; line-height:1.8; }
  #empty code {
    background:var(--border);
    padding:2px 6px;
    border-radius:3px;
    font-size:0.7rem;
    color:var(--yellow);
  }
</style>
</head>
<body>

<!-- 頂部 -->
<div id="topbar">
  <div>
    <div class="title">
      <span class="diamond">◈</span>
      股市分析儀表板
      <span class="badge">v5.0</span>
    </div>
    <div class="subtitle">雙軌模式：波段操作 × 長期持有</div>
  </div>
  <div class="right">
    <div id="updated">—</div>
  </div>
</div>

<!-- 更新指示列 -->
<div id="refresh-bar">
  <div id="refresh-dot"></div>
  <span id="refresh-status">初始化中...</span>
  <span id="new-badge">有新數據</span>
</div>

<!-- 主內容 -->
<div id="market-banner"></div>
<div class="stat-grid" id="stat-wave"></div>
<div class="stat-grid" id="stat-lt" style="margin-bottom:12px"></div>
<div id="cards"></div>
<div id="empty" style="display:none">
  <div class="big">📊</div>
  <p>尚未載入數據<br>請先設定 <code>DATA_URL</code><br>然後在 Colab 執行 <code>stock_v5.ipynb</code></p>
</div>
<div id="footer">
  <div>波段倉位：ATR×2停損，獨立於長期持倉運作。</div>
  <div>長期倉位：週H值破0.55或季線跌破才考慮結構性出場。</div>
  <div>⚡加碼觸發：距支撐≤3% / BB≤15% / 月跌≤-10% / MACD空頭縮短，擇一即提醒。</div>
  <div>大盤bear狀態時，長期加碼自動封鎖。</div>
</div>

<script>
// ══════════════════════════════════════════════
// ⚙️  設定區（第一次設定後不需再改）
// ══════════════════════════════════════════════
const DATA_URL = "https://gist.githubusercontent.com/farmerstrongwu-kai/b0e6749d5824897a0bad72dc5935ab0e/raw/data.json";
// 範例："https://gist.githubusercontent.com/你的帳號/gist_id/raw/data.json"
// Colab 執行完會印出這個 URL，貼入上方引號之間即可

const POLL_INTERVAL = 60;  // 自動更新間隔（秒）
// ══════════════════════════════════════════════

const MACD_LABEL = {
  golden:"黃金交叉", dead:"死亡交叉",
  bull_exp:"多頭擴大", bull_shr:"多頭縮短",
  bear_shr:"空頭縮短", bear_exp:"空頭擴大"
};
const LAMP_COLOR = {
  buy:  {fg:"#4ade80", bg:"#0d2818", bd:"#166534", label:"進攻"},
  wait: {fg:"#fbbf24", bg:"#1a1200", bd:"#92400e", label:"觀察"},
  avoid:{fg:"#f87171", bg:"#2a0a0a", bd:"#7f1d1d", label:"迴避"}
};
const LT_COLOR = {
  "LT-A":{c:"#4ade80",bg:"#081408",bd:"#166534"},
  "LT-B":{c:"#fbbf24",bg:"#1a1200",bd:"#92400e"},
  "LT-C":{c:"#555",  bg:"#111",   bd:"#2a2d3a"}
};
const MARKET_STYLE = {
  bull:  {fg:"#4ade80",bg:"#081408",bd:"#166534"},
  bear:  {fg:"#f87171",bg:"#140808",bd:"#7f1d1d"},
  mixed: {fg:"#fbbf24",bg:"#1a1200",bd:"#92400e"},
  wait:  {fg:"#888",   bg:"#0f1117",bd:"#2a2d3a"},
  unknown:{fg:"#888",  bg:"#0f1117",bd:"#2a2d3a"}
};
const SCORE_COLOR = s => s<=1?"#ef4444":s<=2?"#f97316":s<=3?"#eab308":s<=4?"#84cc16":"#22c55e";

let currentData = null;
let openCards = new Set();
let pollTimer = null;
let lastEtag = "";

// ── 顏色工具 ────────────────────────────────────
const cc = v => v==null?"#666":v>0?"#4ade80":v<0?"#f87171":"#666";
const cs = v => v==null?"—":(v>0?"+":"")+v.toFixed(2)+"%";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ── 渲染大盤 ────────────────────────────────────
function renderMarket(data) {
  const ms = MARKET_STYLE[data.market_status] || MARKET_STYLE.unknown;
  document.getElementById("market-banner").innerHTML = `
    <div class="label" style="color:${ms.fg}">大盤濾網</div>
    <div class="value" style="color:${ms.fg}">${esc(data.market_text)}</div>`;
  document.getElementById("market-banner").style.cssText =
    `background:${ms.bg};border:1px solid ${ms.bd};border-radius:8px;padding:8px 12px;margin-bottom:8px;`;
  document.getElementById("updated").textContent = "更新 " + esc(data.updated);

  const ind = data.stocks.filter(s=>!s.is_market);
  const buyCnt  = ind.filter(s=>s.lamp==="buy").length;
  const waitCnt = ind.filter(s=>s.lamp==="wait").length;
  const avoidCnt= ind.filter(s=>s.lamp==="avoid").length;
  const ltACnt  = ind.filter(s=>s.lt_rating==="LT-A").length;
  const ltBCnt  = ind.filter(s=>s.lt_rating==="LT-B").length;
  const addCnt  = ind.filter(s=>s.add_trigger).length;

  document.getElementById("stat-wave").innerHTML = [
    ["進攻",buyCnt, "#4ade80","#081408","#166534"],
    ["觀察",waitCnt,"#fbbf24","#1a1200","#92400e"],
    ["迴避",avoidCnt,"#f87171","#140808","#7f1d1d"]
  ].map(([l,n,fg,bg,bd])=>`
    <div class="stat-cell" style="background:${bg};border:1px solid ${bd}">
      <div class="num" style="color:${fg}">${n}</div>
      <div class="lbl" style="color:${fg}">${l}</div>
    </div>`).join("");

  document.getElementById("stat-lt").innerHTML = [
    ["LT-A",ltACnt,"#4ade80","#081408","#166534"],
    ["LT-B",ltBCnt,"#fbbf24","#1a1200","#92400e"],
    ["⚡加碼",addCnt,"#a78bfa","#120820","#4c1d95"]
  ].map(([l,n,fg,bg,bd])=>`
    <div class="stat-cell" style="background:${bg};border:1px solid ${bd}">
      <div class="num" style="color:${fg}">${n}</div>
      <div class="lbl" style="color:${fg}">${l}</div>
    </div>`).join("");
}

// ── 渲染卡片 ────────────────────────────────────
function renderCard(s) {
  const lc = LAMP_COLOR[s.lamp] || LAMP_COLOR.avoid;
  const hVs = s.h_vs_avg != null ? (s.h_vs_avg>=0?"+":"")+s.h_vs_avg.toFixed(3) : "N/A";
  const hasLT = s.lt_rating && s.lt_rating !== "LT-C";
  const isOpen = openCards.has(s.symbol);
  const ltc = LT_COLOR[s.lt_rating] || LT_COLOR["LT-C"];

  // LT 區塊
  let ltBlock = "";
  if (!s.is_market && hasLT) {
    let posBlock = "";
    if (s.lt_position) {
      const p = s.lt_position;
      const pnlColor = p.lt_pnl != null && p.lt_pnl >= 0 ? "#4ade80" : "#f87171";
      posBlock = `<div class="lt-pos-box">
        <div class="lp-label">長期持倉</div>
        <div class="lp-row">
          <span class="lp-item">核心 ${esc(p.core_size)}</span>
          <span class="lp-item">均成本 ${p.avg_cost||"未設定"}</span>
          <span class="lp-pnl" style="color:${pnlColor}">${p.lt_pnl!=null?(p.lt_pnl>=0?"+":"")+p.lt_pnl+"%" : "—"}</span>
        </div>
        <div style="font-size:0.56rem;color:#3a5a7a;margin-top:2px">已加碼 ${p.add_count} 次</div>
      </div>`;
    }
    let addBlock = "";
    if (s.add_blocked) {
      addBlock = `<div class="add-blocked">🚫 ${esc(s.add_block_reason)}</div>`;
    } else if (s.add_trigger) {
      const sigs = (s.add_signals||[]).map(sg=>`<span class="add-sig">${esc(sg)}</span>`).join("");
      addBlock = `<div class="add-trigger-box">
        <div class="atitle">⚡ 長期加碼觸發</div>
        <div class="add-sigs">${sigs}</div>
      </div>`;
    }
    let stopBlock = "";
    if (s.lt_stop_alert && s.lt_stop_alerts?.length) {
      stopBlock = `<div class="lt-stop-box">${s.lt_stop_alerts.map(esc).join("<br>")}</div>`;
    }
    ltBlock = `<div style="margin-bottom:7px">
      <div class="lt-badge" style="background:${ltc.bg};border:1px solid ${ltc.bd}">
        <span class="lt-code" style="color:${ltc.c}">${esc(s.lt_rating)}</span>
        <span class="lt-text" style="color:${ltc.c}">${esc(s.lt_rating_text)}</span>
      </div>
      ${posBlock}${addBlock}${stopBlock}
    </div>`;
  }

  // 波段區塊
  let waveBlock = "";
  if (!s.is_market) {
    const rn_ok = s.rr_now_ok, re_ok = s.rr_entry_ok;
    waveBlock = `
      <div class="grid2" style="margin-bottom:5px">
        <div class="ptag">
          <div class="pl">買點區間</div>
          <div class="pv" style="color:#4ade80">${s.buy_low}~${s.buy_high}</div>
        </div>
        <div class="ptag">
          <div class="pl">ATR停損 (-${s.stop_pct}%)</div>
          <div class="pv" style="color:#f87171">${s.stop_atr}</div>
        </div>
      </div>
      <div class="grid2" style="margin-bottom:7px">
        <div class="rr-box" style="background:${rn_ok?"#081408":"#140808"};border:1px solid ${rn_ok?"#166534":"#7f1d1d"}">
          <div class="rl" style="color:${rn_ok?"#4ade80":"#f87171"}">現價風報比</div>
          <div class="rv" style="color:${rn_ok?"#4ade80":"#f87171"}">${s.rr_now??'—'}</div>
        </div>
        <div class="rr-box" style="background:#0f1117;border:1px solid #1e2130">
          <div class="rl" style="color:#444">回測後風報比</div>
          <div class="rv" style="color:${re_ok?"#4ade80":"#555"}">${s.rr_entry??'—'}</div>
        </div>
      </div>`;
  }

  // 五關
  const gateHtml = (ok, label, pending=false) => {
    if (pending) return `<span class="gate pnd">⏳${esc(label)}</span>`;
    return `<span class="gate ${ok?"ok":"no"}">${ok?"✓":"✗"} ${esc(label)}</span>`;
  };

  // 展開層
  let ltDetailBlock = "";
  if (!s.is_market && s.lt_rating) {
    const sigs = s.add_signals?.length ? `<div class="ld-sigs">加碼訊號：${s.add_signals.map(esc).join(" + ")}</div>` : "";
    ltDetailBlock = `<div class="lt-detail">
      <div class="ld-label">長期持有分析</div>
      <div class="ld-row">
        <span class="ld-rating" style="color:${ltc.c}">${esc(s.lt_rating)}</span>
        <span class="ld-text" style="color:${ltc.c}">${esc(s.lt_rating_text)}</span>
        <span class="ld-score">${s.lt_score}/5分</span>
      </div>
      <div class="ld-reasons">${esc(s.lt_reasons||"")}</div>
      ${sigs}
    </div>`;
  }

  const inds = [
    ["H值(日)", s.h_day?.toFixed(4)],
    ["H值(週)", s.h_week??"N/A"],
    ["DI+", s.di_pos], ["DI-", s.di_neg],
    ["ATR", s.atr],
    ["月漲跌", cs(s.month_chg)],
    ["年漲跌", cs(s.year_chg)],
    ["BB位置", s.bb_pct+"%"]
  ].map(([k,v])=>`<div class="ind-cell"><div class="ik">${esc(k)}</div><div class="iv">${esc(v??'—')}</div></div>`).join("");

  return `
  <div class="card ${isOpen?"open":""}" id="card-${esc(s.symbol)}">
    <div class="card-head" onclick="toggleCard('${esc(s.symbol)}')">
      <div class="row-title">
        <div class="name-area">
          <span class="stock-name" style="color:${s.is_market?"#8899bb":"#e2e8f0"}">${esc(s.name)}</span>
          ${s.is_market?'<span class="market-tag">大盤</span>':''}
          <span class="symbol">${esc(s.symbol)}</span>
        </div>
        <div style="display:flex;align-items:center">
          <span class="lamp-badge" style="background:${lc.bg};color:${lc.fg};border:1px solid ${lc.bd}">${lc.label}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="row-price">
        <span class="price" style="color:${s.is_market?"#8899bb":"#f1f5f9"}">${(s.price||0).toLocaleString()}</span>
        <span class="day-chg" style="color:${cc(s.day_chg)}">${cs(s.day_chg)}</span>
        <span class="week-chg">週${cs(s.week_chg)}</span>
      </div>
      ${!s.is_market ? ltBlock : ""}
      ${waveBlock}
      <div class="gates">
        ${gateHtml(s.gate_h, `H ${(s.h_day||0).toFixed(3)}(${hVs})`)}
        ${gateHtml(s.gate_adx, `ADX ${s.adx}${s.adx_rising?"↑":"↓"}`)}
        ${gateHtml(s.gate_macd, MACD_LABEL[s.macd_status]||s.macd_status)}
        ${gateHtml(s.gate_vol, `量 ${s.vol_ratio}x`, !s.vol_reliable)}
        ${gateHtml(s.gate_bb, `BB ${s.bb_pct}%`)}
      </div>
      <div class="score-bar">
        <div class="score-track"><div class="score-fill" style="width:${(s.score/5)*100}%;background:${SCORE_COLOR(s.score)}"></div></div>
        <span class="score-label">${s.score}/5</span>
      </div>
    </div>
    <div class="card-body">
      ${ltDetailBlock}
      <div class="section-title">支撐 ／ 壓力</div>
      <div class="sup-res" style="margin-bottom:10px">
        <div class="sup-box">
          <div class="sl">▲ 支撐</div>
          <div class="sv">${s.support}</div>
          <div class="sd">距今 ${s.dist_to_support}%</div>
        </div>
        <div class="res-box">
          <div class="sl">▼ 壓力</div>
          <div class="sv">${s.resistance}</div>
        </div>
      </div>
      <div class="section-title">目標價位</div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="ptag"><div class="pl">目標一（壓力位）</div><div class="pv" style="color:#fbbf24">${s.target1}</div></div>
        <div class="ptag"><div class="pl">目標二（壓力×1.05）</div><div class="pv" style="color:#fbbf24">${s.target2}</div></div>
      </div>
      <div class="section-title">詳細指標</div>
      <div class="indicators">${inds}</div>
    </div>
  </div>`;
}

// ── 渲染全頁 ────────────────────────────────────
function render(data) {
  renderMarket(data);
  const sorted = [...data.stocks].sort((a,b)=>{
    if (a.is_market && !b.is_market) return -1;
    if (!a.is_market && b.is_market) return 1;
    const o = {buy:0,wait:1,avoid:2};
    return (o[a.lamp]??9)-(o[b.lamp]??9) || b.score-a.score;
  });
  document.getElementById("cards").innerHTML = sorted.map(renderCard).join("");
  document.getElementById("empty").style.display = sorted.length ? "none" : "block";
}

// ── 卡片展開 ────────────────────────────────────
function toggleCard(symbol) {
  if (openCards.has(symbol)) openCards.delete(symbol);
  else openCards.add(symbol);
  const el = document.getElementById(`card-${symbol}`);
  if (el) el.classList.toggle("open");
}

// ── 震動提示（加碼觸發）────────────────────────
function checkVibrate(newData) {
  if (!currentData || !navigator.vibrate) return;
  const oldTriggers = new Set(currentData.stocks.filter(s=>s.add_trigger).map(s=>s.symbol));
  const newTriggers = newData.stocks.filter(s=>s.add_trigger&&!oldTriggers.has(s.symbol));
  if (newTriggers.length) {
    navigator.vibrate([200,100,200]);
  }
}

// ── 數據更新 ────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById("refresh-dot");
  dot.className = `${state}`;
  document.getElementById("refresh-status").textContent = text;
}

async function fetchData(force=false) {
  if (!DATA_URL) {
    setStatus("error", "請設定 DATA_URL");
    document.getElementById("empty").style.display = "block";
    return;
  }
  setStatus("updating", "更新中...");
  try {
    const url = DATA_URL + "?t=" + Date.now(); // 防快取
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const badge = document.getElementById("new-badge");
    if (currentData && data.updated !== currentData.updated) {
      badge.style.display = "inline";
      setTimeout(()=>badge.style.display="none", 4000);
      checkVibrate(data);
    }
    currentData = data;
    render(data);
    setStatus("live", `每 ${POLL_INTERVAL}s 自動更新`);
  } catch(e) {
    setStatus("error", "載入失敗，將重試");
    console.error(e);
  }
}

// ── 自動輪詢 ────────────────────────────────────
function startPolling() {
  fetchData(true);
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(()=>fetchData(), POLL_INTERVAL * 1000);
}

// 頁面可見時立刻更新
document.addEventListener("visibilitychange", ()=>{
  if (document.visibilityState === "visible") fetchData();
});

startPolling();
</script>
</body>
